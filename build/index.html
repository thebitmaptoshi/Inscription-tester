<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GoldenEye Viewer</title>
  <style>
    body { margin: 0; background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>
<script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { CSS3DRenderer, CSS3DObject } from 'three/addons/renderers/CSS3DRenderer.js';

  const scene = new THREE.Scene();
  const cssScene = new THREE.Scene();

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 500000);
  camera.position.set(0, 500, 3000);

  const glRenderer = new THREE.WebGLRenderer({ antialias: true });
  glRenderer.setSize(window.innerWidth, window.innerHeight);
  glRenderer.setPixelRatio(window.devicePixelRatio);
  document.body.appendChild(glRenderer.domElement);

  const cssRenderer = new CSS3DRenderer();
  cssRenderer.setSize(window.innerWidth, window.innerHeight);
  cssRenderer.domElement.style.position = 'absolute';
  cssRenderer.domElement.style.top = '0';
  cssRenderer.domElement.style.pointerEvents = 'none';
  document.body.appendChild(cssRenderer.domElement);

  // First-person camera controls
  const keys = { w: false, a: false, s: false, d: false, q: false, e: false, shift: false };
  const mouse = { x: 0, y: 0, locked: false };
  const euler = new THREE.Euler(0, 0, 0, 'YXZ');
  const speed = 300;
  const sprintSpeed = 900;

  document.addEventListener('keydown', (e) => {
    if (e.key.toLowerCase() === 'w') keys.w = true;
    if (e.key.toLowerCase() === 'a') keys.a = true;
    if (e.key.toLowerCase() === 's') keys.s = true;
    if (e.key.toLowerCase() === 'd') keys.d = true;
    if (e.key.toLowerCase() === 'q') keys.q = true;
    if (e.key.toLowerCase() === 'e') keys.e = true;
    if (e.key === 'Shift') keys.shift = true;
  });
  document.addEventListener('keyup', (e) => {
    if (e.key.toLowerCase() === 'w') keys.w = false;
    if (e.key.toLowerCase() === 'a') keys.a = false;
    if (e.key.toLowerCase() === 's') keys.s = false;
    if (e.key.toLowerCase() === 'd') keys.d = false;
    if (e.key.toLowerCase() === 'q') keys.q = false;
    if (e.key.toLowerCase() === 'e') keys.e = false;
    if (e.key === 'Shift') keys.shift = false;
  });

  document.addEventListener('click', () => {
    glRenderer.domElement.requestPointerLock = glRenderer.domElement.requestPointerLock || glRenderer.domElement.mozRequestPointerLock;
    glRenderer.domElement.requestPointerLock();
  });

  document.addEventListener('mousemove', (e) => {
    if (document.pointerLockElement === glRenderer.domElement) {
      mouse.x -= e.movementX * 0.005;
      mouse.y -= e.movementY * 0.005;
      mouse.y = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, mouse.y));
    }
  });

  document.addEventListener('pointerlockchange', () => {
    mouse.locked = document.pointerLockElement === glRenderer.domElement;
  });

  scene.add(new THREE.AmbientLight(0xffffff, 2.0));

  const raycaster = new THREE.Raycaster();
  const css3dObjects = []; // Track CSS3D objects for occlusion

  const loader = new GLTFLoader();
  loader.load('exports/Facility/Facility.glb', (gltf) => {
    scene.add(gltf.scene);

    gltf.scene.traverse((obj) => {
      if (!obj.isMesh) return;
      const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
      mats.forEach((mat, idx) => {
        if (!mat.name || !mat.name.startsWith('video_screen')) return;
        console.log(`Processing material: ${mat.name}`);
        const url = (mat.userData && mat.userData.videoUrl)
          || 'https://ordinals.com/content/6fabc9c42d2dd697658f922f8e2ebb041d54a786bab354f90dfc26ef577d31bdi1';

        // Ordinal screen gets iframe as CSS3D object
        if (mat.name.includes('ordinal_screen')) {
          const box = new THREE.Box3().setFromObject(obj);
          const center = box.getCenter(new THREE.Vector3());
          const size = box.getSize(new THREE.Vector3());

          // Detect plane orientation: smallest dimension = normal direction
          // CSS3DObject default normal is +Z, so we rotate to match the plane's normal
          const dims = [
            { axis: 'x', val: Math.abs(size.x) },
            { axis: 'y', val: Math.abs(size.y) },
            { axis: 'z', val: Math.abs(size.z) }
          ].sort((a, b) => a.val - b.val);
          const normalAxis = dims[0].axis;  // smallest = normal direction
          // Width/height = the two non-normal dimensions (actual mesh size)
          const width = dims[2].val || 300;
          const height = dims[1].val || 300;

          const iframeDiv = document.createElement('div');
          iframeDiv.style.width = width + 'px';
          iframeDiv.style.height = height + 'px';
          iframeDiv.style.overflow = 'hidden';
          iframeDiv.style.border = 'none';
          iframeDiv.style.background = '#000';

          const iframe = document.createElement('iframe');
          iframe.src = url;
          iframe.style.width = '100%';
          iframe.style.height = '100%';
          iframe.style.border = 'none';
          iframe.style.margin = '0';
          iframe.style.padding = '0';
          iframeDiv.appendChild(iframe);

          const css3dObject = new CSS3DObject(iframeDiv);
          css3dObject.position.copy(center);
          css3dObject.scale.set(1, 1, 1);
          // Rotate iframe so its normal matches the mesh plane's normal
          const flipNormal = mat.userData && mat.userData.flipNormal;

          if (normalAxis === 'x') {
            css3dObject.rotation.y = flipNormal ? Math.PI / 2 : -Math.PI / 2;
          } else if (normalAxis === 'y') {
            css3dObject.rotation.x = flipNormal ? -Math.PI / 2 : Math.PI / 2;
          } else {
            // normalAxis === 'z'
            if (flipNormal) {
              css3dObject.rotation.y = Math.PI;  // Flip 180° around Y axis
            }
          }
          // normalAxis === 'z' is the default, no rotation needed
          css3dObject.userData.worldPosition = center.clone();
          cssScene.add(css3dObject);
          css3dObjects.push({ css3d: css3dObject, worldPos: center.clone() });
          console.log('CSS3D iframe created at:', center, 'size:', width, 'x', height, 'normalAxis:', normalAxis);
        } else {
          // Try image first (for static inscriptions), then video, then iframe (for HTML)
          const img = new Image();
          img.crossOrigin = 'anonymous';

          img.onload = () => {
            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            canvas.getContext('2d').drawImage(img, 0, 0);
            const tex = new THREE.CanvasTexture(canvas);
            const newMat = new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide });
            if (Array.isArray(obj.material)) obj.material[idx] = newMat;
            else obj.material = newMat;
            console.log('Image texture applied:', mat.name);
          };

          img.onerror = () => {
            console.error(`Image load failed for ${mat.name}: ${url}. Trying video fallback.`);
            // Fallback to video if image fails
            const video = document.createElement('video');
            video.src = url;
            video.crossOrigin = 'anonymous';
            video.loop = true;
            video.muted = true;
            video.playsInline = true;
            video.play();

            video.addEventListener('canplay', () => {
              const tex = new THREE.VideoTexture(video);
              const newMat = new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide });
              if (Array.isArray(obj.material)) obj.material[idx] = newMat;
              else obj.material = newMat;
              console.log('Video texture applied:', mat.name);
            });

            video.addEventListener('error', () => {
              if (!mat.name.includes('ordinal_screen') && !mat.name.includes('ordinal_display')) {
                console.warn(`Video load failed for ${mat.name}, leaving transparent`);
                return;
              }
              console.error(`Video load also failed for ${mat.name}. Trying iframe fallback.`);
              // Last resort: try iframe (for HTML ordinals)
              const box = new THREE.Box3().setFromObject(obj);
              const center = box.getCenter(new THREE.Vector3());
              const size = box.getSize(new THREE.Vector3());

              // Detect plane orientation: smallest dimension = normal direction
              const dims = [
                { axis: 'x', val: Math.abs(size.x) },
                { axis: 'y', val: Math.abs(size.y) },
                { axis: 'z', val: Math.abs(size.z) }
              ].sort((a, b) => a.val - b.val);
              const normalAxis = dims[0].axis;
              const width = dims[2].val || 300;
              const height = dims[1].val || 300;

              const iframeDiv = document.createElement('div');
              iframeDiv.style.width = width + 'px';
              iframeDiv.style.height = height + 'px';
              iframeDiv.style.overflow = 'hidden';
              iframeDiv.style.border = 'none';
              iframeDiv.style.background = '#000';

              const iframe = document.createElement('iframe');
              iframe.src = url;
              iframe.style.width = '100%';
              iframe.style.height = '100%';
              iframe.style.border = 'none';
              iframe.style.margin = '0';
              iframe.style.padding = '0';
              iframeDiv.appendChild(iframe);

              const css3dObject = new CSS3DObject(iframeDiv);
              css3dObject.position.copy(center);
              css3dObject.scale.set(1, 1, 1);
              // Rotate iframe so its normal matches the mesh plane's normal
              const flipNormal = mat.userData && mat.userData.flipNormal;

              if (normalAxis === 'x') {
                css3dObject.rotation.y = flipNormal ? Math.PI / 2 : -Math.PI / 2;
              } else if (normalAxis === 'y') {
                css3dObject.rotation.x = flipNormal ? -Math.PI / 2 : Math.PI / 2;
              } else {
                if (flipNormal) {
                  css3dObject.rotation.y = Math.PI;
                }
              }
              css3dObject.userData.worldPosition = center.clone();
              cssScene.add(css3dObject);
              css3dObjects.push({ css3d: css3dObject, worldPos: center.clone() });
              console.log('HTML iframe applied:', mat.name, 'at:', center, 'normalAxis:', normalAxis);
            });
          };

          img.src = url;
        }
      });
    });
  });

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    glRenderer.setSize(window.innerWidth, window.innerHeight);
    cssRenderer.setSize(window.innerWidth, window.innerHeight);
  });

  (function animate() {
    requestAnimationFrame(animate);

    // Camera movement
    const delta = 1 / 60;
    const currentSpeed = keys.shift ? sprintSpeed : speed;
    const movement = new THREE.Vector3();
    if (keys.w) movement.z -= currentSpeed * delta;
    if (keys.s) movement.z += currentSpeed * delta;
    if (keys.a) movement.x -= currentSpeed * delta;
    if (keys.d) movement.x += currentSpeed * delta;
    if (keys.q) movement.y -= currentSpeed * delta;
    if (keys.e) movement.y += currentSpeed * delta;
    movement.applyAxisAngle(new THREE.Vector3(0, 1, 0), mouse.x);
    camera.position.addVectors(camera.position, movement);

    // Camera rotation
    euler.setFromQuaternion(camera.quaternion);
    euler.setFromVector3(new THREE.Vector3(mouse.y, mouse.x, 0));
    camera.quaternion.setFromEuler(euler);

    // Occlusion detection for CSS3D objects
    css3dObjects.forEach(({ css3d, worldPos }) => {
      const direction = new THREE.Vector3().subVectors(worldPos, camera.position).normalize();
      const distance = camera.position.distanceTo(worldPos);
      raycaster.set(camera.position, direction);

      const intersects = raycaster.intersectObjects(scene.children, true);
      let isOccluded = false;

      // Check if any geometry is between camera and CSS3D object
      for (let i = 0; i < intersects.length; i++) {
        if (intersects[i].distance < distance - 10) { // 10 unit tolerance
          isOccluded = true;
          break;
        }
      }

      css3d.element.style.visibility = isOccluded ? 'hidden' : 'visible';
    });

    glRenderer.render(scene, camera);
    cssRenderer.render(cssScene, camera);
  })();
</script>
</body>
</html>
